<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日麻計分器</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --border: #ddd;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--primary); margin: 0; padding: 6px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 15px; margin-top: 10px; }
        
        .card { background: var(--card-bg); border-radius: 8px; padding: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-color); padding-bottom: 8px; margin-bottom: 12px; }
        .card-header h2 { font-size: 1.1rem; margin: 0; }
        .add-btn-small { background-color: var(--success); color: white; border: none; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 5px; }
        
        .flex-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .flex-row select { flex: 1; font-weight: bold; }
        .flex-row input { flex: 1.5; }
        
        input[type="text"], input[type="number"], select { 
            width: 100%; 
            padding: 6px 2px; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-size: 0.9rem; 
            text-align: center; 
            background-color: white;
        }
        
        .round { border: 1px solid var(--border); padding: 10px 8px 2px 8px; border-radius: 6px; margin-bottom: 12px; background-color: #fafafa; }
        .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; font-size: 0.95rem; }
        
        .warning { color: var(--danger); font-size: 0.8rem; }
        .valid { color: var(--success); font-size: 0.8rem; }
        
        .btn-large { background-color: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-large:active { background-color: #2980b9; }

        .btn-danger { background-color: white; color: var(--danger); border: 2px solid var(--danger); padding: 12px; width: 100%; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 25px; }
        .btn-danger:active { background-color: #ffeaea; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { text-align: center; padding: 10px 4px; border-bottom: 1px solid var(--border); }
        th { background-color: var(--bg-color); font-size: 0.9rem; }
        .total-row { font-weight: bold; font-size: 1.1rem; background-color: #e8f4f8; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>日麻計分器</h1>

    <div class="card">
        <div class="card-header">
            <h2>玩家</h2>
            <button class="add-btn-small" onclick="addPlayer()">+</button>
        </div>
        <div class="grid-4" id="playerNames">
            </div>
    </div>

    <div class="card" id="roundsContainer">
        <h2>場次</h2>
        <div id="roundsList"></div>
        <button class="btn-large" onclick="addRound()">+ Add New Round</button>
    </div>

    <div class="card">
        <h2>最终計分</h2>
        <table id="settlementTable">
            <thead>
                <tr>
                    <th>玩家</th>
                    <th>輸贏</th>
                </tr>
            </thead>
            <tbody id="settlementBody">
                </tbody>
        </table>
    </div>

    <button class="btn-danger" onclick="resetGame()">🗑️ Reset Game Data</button>
</div>

<script>
    const BASE_SCORE = 25000;
    const DIVISOR = 50;
    const BONUSES = [800, 400, -200, -1000];
    
    let players = ["老人", "乃哥", "魔魟", "提姆"];
    let rounds = [];

    // --- LOCAL STORAGE FUNCTIONS ---
    function saveData() {
        const dataToSave = {
            players: players,
            rounds: rounds
        };
        localStorage.setItem('mahjongLedgerData', JSON.stringify(dataToSave));
    }

    function loadData() {
        const savedData = localStorage.getItem('mahjongLedgerData');
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            players = parsedData.players || ["老人", "乃哥", "魔魟", "提姆"];
            rounds = parsedData.rounds || [];
            renderPlayers();
            updateUI(); // Will re-render rounds and table
        } else {
            // First time opening the app
            renderPlayers();
            addRound(); 
        }
    }

    function resetGame() {
        if (confirm("Are you sure you want to clear all scores and start a new game?")) {
            localStorage.removeItem('mahjongLedgerData');
            players = ["老人", "乃哥", "魔魟", "提姆"];
            rounds = [];
            renderPlayers();
            addRound();
        }
    }
    // --------------------------------

    function renderPlayers() {
        const container = document.getElementById('playerNames');
        container.innerHTML = '';
        players.forEach((name, i) => {
            container.innerHTML += `<input type="text" value="${name}" onchange="updatePlayerName(${i}, this.value)">`;
        });
        updateUI();
    }

    function addPlayer() {
        if (players.length === 4) {
            players.push("狗德");
        } else {
            players.push(`玩家 ${players.length + 1}`);
        }
        renderPlayers();
        saveData();
    }

    function updatePlayerName(index, newName) {
        players[index] = newName;
        updateUI();
        saveData();
    }

    function addRound() {
        let defaultPlayers = [0, 1, 2, 3].map(i => i < players.length ? i : 0);
        rounds.push([
            {p: defaultPlayers[0], s: 25000}, 
            {p: defaultPlayers[1], s: 25000}, 
            {p: defaultPlayers[2], s: 25000}, 
            {p: defaultPlayers[3], s: 25000}
        ]);
        updateUI();
        saveData();
    }

    function updateSlotPlayer(roundIndex, slotIndex, playerIndex) {
        rounds[roundIndex][slotIndex].p = parseInt(playerIndex);
        updateUI();
        saveData();
    }

    function updateSlotScore(roundIndex, slotIndex, value) {
        rounds[roundIndex][slotIndex].s = parseInt(value) || 0;
        updateUI();
        saveData();
    }

    function calculateRoundCashouts(roundData) {
        let sorted = [...roundData].sort((a, b) => b.s - a.s);
        let cashouts = {};

        let i = 0;
        while (i < 4) {
            let j = i;
            while (j < 4 && sorted[j].s === sorted[i].s) j++;
            
            let tieCount = j - i;
            let sumBonus = 0;
            for (let k = i; k < j; k++) sumBonus += BONUSES[k];
            let avgBonus = sumBonus / tieCount;

            for (let k = i; k < j; k++) {
                let basePoints = (sorted[k].s - BASE_SCORE) / DIVISOR;
                cashouts[sorted[k].p] = basePoints + avgBonus;
            }
            i = j;
        }
        return cashouts; 
    }

    function updateUI() {
        const roundsList = document.getElementById('roundsList');
        roundsList.innerHTML = '';
        
        let grandTotals = new Array(players.length).fill(0);

        rounds.forEach((roundData, roundIndex) => {
            let sum = roundData.reduce((acc, curr) => acc + curr.s, 0);
            let activePlayers = new Set(roundData.map(r => r.p));
            
            let isSumValid = sum === 100000;
            let isPlayersValid = activePlayers.size === 4;
            let isValid = isSumValid && isPlayersValid;
            
            let statusText = '';
            if (isValid) {
                statusText = `<span class="valid">Sum: 100,000 ✓</span>`;
                let roundCashouts = calculateRoundCashouts(roundData);
                for(let pIndex in roundCashouts) {
                    grandTotals[pIndex] += roundCashouts[pIndex];
                }
            } else if (!isPlayersValid) {
                statusText = `<span class="warning">⚠ Duplicate Players</span>`;
            } else {
                statusText = `<span class="warning">Sum: ${sum} ⚠</span>`;
            }

            let slotsHtml = roundData.map((slotData, slotIndex) => {
                let optionsHtml = players.map((name, i) => 
                    `<option value="${i}" ${slotData.p === i ? 'selected' : ''}>${name}</option>`
                ).join('');
                
                return `
                    <div class="flex-row">
                        <select onchange="updateSlotPlayer(${roundIndex}, ${slotIndex}, this.value)">
                            ${optionsHtml}
                        </select>
                        <input type="number" step="100" inputmode="numeric" value="${slotData.s}" 
                            onchange="updateSlotScore(${roundIndex}, ${slotIndex}, this.value)">
                    </div>
                `;
            }).join('');

            let roundHtml = `
                <div class="round">
                    <div class="round-header">
                        <span>Round ${roundIndex + 1}</span>
                        ${statusText}
                    </div>
                    <div>${slotsHtml}</div>
                </div>
            `;
            roundsList.innerHTML += roundHtml;
        });

        const tbody = document.getElementById('settlementBody');
        tbody.innerHTML = '';

        for (let i = 0; i < players.length; i++) {
            let val = grandTotals[i];
            let participated = rounds.some(r => r.some(slot => slot.p === i));
            
            if (participated || val !== 0) {
                let colorClass = val > 0 ? 'positive' : (val < 0 ? 'negative' : '');
                let sign = val > 0 ? '+' : '';
                
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: bold;">${players[i]}</td>
                        <td class="total-row ${colorClass}">${sign}${val.toFixed(1)}</td>
                    </tr>
                `;
            }
        }
        
        // Save state at the end of every UI update
        saveData();
    }

    // Initialize app by loading from storage
    loadData();
</script>

</body>
</html>
